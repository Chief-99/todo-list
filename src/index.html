<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>

<body>
    
    <div id="modal">
        <div id="modal-content">
            <form action="get" id="todo-form">
                <p class="form-section">
                    <label for="title-input">Title:</label>
                    <input type="text" id="title-input">
                </p>

                <p class="form-section">
                    <label for="description-input">Description:</label>
                    <input type="text" id="description-input">
                </p>

                <p class="form-section">
                    <label for="due-date-input">Due date:</label>
                    <input type="datetime-local" id="due-date-input">
                </p>
                
                <p class="form-section">
                    <label for="priority-input">Priority</label>
                    <select name="priority-input" id="priority-input">
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </p>
            </form>
            
            <button id="add-todo">Confirm</button>
        </div>
    </div>
    
    <button id="open-todo-form">Add todo</button>


    <div id="display-div">

    </div>
</body>

</html>
